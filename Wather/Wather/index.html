<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima Neón • Azul Oscuro</title>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
        
        <!-- Título principal -->
        <div class="text-center mb-5">
            <h1 class="display-3 fw-bold text-white neon-title">
                <i class="fas fa-cloud-sun-rain me-3"></i>Clima Neón
            </h1>
            <p class="lead text-cyan">Consulta el clima en tiempo real</p>
        </div>

        <!-- Barra de búsqueda -->
        <div class="search-container mb-5">
            <div class="input-group input-group-lg" style="max-width: 500px;">
                <input 
                    type="text" 
                    id="searchInput"
                    class="form-control neon-input" 
                    placeholder="Ingresa una ciudad (ej: Santo Domingo)"
                    autocomplete="off">
                <button id="searchBtn" class="btn neon-btn">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="text-center mt-2">
                <small class="text-muted">Presiona Enter o haz clic en el ícono</small>
            </div>
        </div>

        <!-- Contenedor donde aparecerán las tarjetas -->
        <div id="weatherContainer" class="w-100 d-flex justify-content-center"></div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
